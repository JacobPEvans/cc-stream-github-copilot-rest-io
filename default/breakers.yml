GitHub Copilot Usage Ruleset:
  lib: custom
  minRawLength: 256
  tags: github,copilot
  rules:
    - condition: /^\[/
      type: json_array
      timestampAnchorRegex: /^/
      timestamp:
        type: format
        length: 150
        format: "%Y-%m-%dT%H:%M:%S"
      timestampTimezone: local
      timestampEarliest: -420weeks
      timestampLatest: +1week
      maxEventBytes: 51200
      disabled: false
      parserEnabled: false
      shouldUseDataRaw: false
      jsonExtractAll: true
      delimiterRegex: /\t/
      fieldsLineRegex: /^#[Ff]ields[:]?\s+(.*)/
      headerLineRegex: /^#/
      nullFieldVal: "-"
      cleanFields: true
      eventBreakerRegex: /[\n\r]+(?!\s)/
      name: GitHub Copilot Usage Metrics
      jsonArrayField: ""
      parentFieldsToCopy:
        - "*"
      jsonTimeField: day
